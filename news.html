  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .news-section{padding-block:5rem}
    /* News items (add items in the JS array below) */
    .news-list{list-style:none;display:flex;flex-direction:column;gap:1.4rem}
    .news-item{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1.75rem;opacity:0;transform:translateY(18px);animation:fadeUp .6s ease forwards}
    .news-date{font-size:.8rem;color:var(--blue);font-weight:600;letter-spacing:.05em;display:block;margin-bottom:.4rem}
    .news-title{font-size:1.15rem;margin-bottom:.5rem}
    .news-excerpt{color:var(--muted);line-height:1.75;font-size:.98rem}
    @keyframes fadeUp{to{opacity:1;transform:none}}
    .fu{animation:fadeUp .7s ease both}
    .d1{animation-delay:.1s}.d2{animation-delay:.2s}
  </style>
</head>
<body>

<main>
  <section class="page-hero">
    <div class="container">
      <span class="label fu" style="color:var(--blue-light)">Updates</span>
      <h1 class="page-title fu d1">News</h1>
      <p class="page-subtitle fu d2">Latest updates, events, and announcements from the SCIE-PANC consortium.</p>
    </div>
  </section>

  <div class="divider"></div>

  <section class="news-section">
    <div class="container" id="news-container">
      <!-- Populated by JS below -->
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <div><span class="footer-brand-name">SCIE-PANC</span><p class="footer-desc">An international research consortium studying pancreatic cancer therapy evasion.</p></div>
    <nav class="footer-links">
      <a href="index.html">Home</a><a href="project.html">Project</a><a href="news.html">News</a><a href="publications.html">Publications</a><a href="https://github.com/SCIE-PANC" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </div>
  <div class="container footer-bottom"><p>© <span id="yr"></span> SCIE-PANC Consortium.</p></div>
</footer>

<script src="js/main.js"></script>
<script>
document.getElementById('yr').textContent = new Date().getFullYear();

// ─── ADD YOUR NEWS ITEMS HERE ───────────────────────────────────
// Each object: { date: 'YYYY-MM-DD', title: '...', excerpt: '...' }
const newsItems = [
  // Example (uncomment and edit):
  // {
  //   date: '2025-03-01',
  //   title: 'Kick-off meeting held in Göttingen',
  //   excerpt: 'The SCIE-PANC consortium gathered for the first time at UMG for the project kick-off meeting.'
  // },
];
// ────────────────────────────────────────────────────────────────

const container = document.getElementById('news-container');

if (newsItems.length === 0) {
  container.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">📡</div>
      <h2>Stay tuned</h2>
      <p>News and updates will appear here as the project progresses. Follow us on GitHub for the latest developments.</p>
      <a href="https://github.com/SCIE-PANC" class="btn-navy" target="_blank" rel="noopener">Follow on GitHub</a>
    </div>`;
} else {
  const sorted = [...newsItems].sort((a,b) => b.date.localeCompare(a.date));
  container.innerHTML = `<ul class="news-list">${
    sorted.map((item, i) => `
      <li class="news-item" style="animation-delay:${i*0.08}s">
        <time class="news-date">${item.date}</time>
        <h3 class="news-title">${item.title}</h3>
        <p class="news-excerpt">${item.excerpt}</p>
      </li>`).join('')
  }</ul>`;
}
</script>
